<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e0e11">
<title>Recetas · Capsule Pantry</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e11;--card:#18181c;--card2:#1f1f25;--accent:#7aad6a;--accent2:#c8a862;--text:#e8e4dc;--dim:#8a8680;--border:#2a2a30;--bfast:#ad8aad;--quick:#6a8aad;--elab:#ad9a6a;--cheat:#c87a5a;--prot:#ad7a7a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace}
.app{max-width:700px;margin:0 auto;padding:16px 16px 80px}
header{text-align:center;padding:32px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px}
header h1{font-size:1.6rem;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{font-size:.8rem;color:var(--dim);font-weight:300;margin-top:6px;line-height:1.5}
.tabs{display:flex;margin-bottom:18px;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tab{flex:1;text-align:center;padding:12px 8px;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--dim);border:none;background:none;font-family:'Outfit',sans-serif;transition:all .15s}
.tab.active{color:var(--accent);background:var(--card2);box-shadow:inset 0 -2px 0 var(--accent)}
.tab:active{background:var(--card2)}
.filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:10px}
.fbtn{font-family:'Outfit',sans-serif;font-size:.7rem;font-weight:600;padding:6px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer}
.fbtn:active{transform:scale(.95)}
.fbtn.active{color:var(--text);background:var(--card2);border-color:#444}
.recipe{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.recipe.hidden{display:none}
.rh{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:8px}
.rh:active{background:var(--card2)}
.rtag{font-size:.55rem;font-weight:700;padding:3px 6px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.rtag-bfast{background:rgba(173,138,173,.1);color:var(--bfast);border:1px solid rgba(173,138,173,.2)}
.rtag-quick{background:rgba(106,138,173,.1);color:var(--quick);border:1px solid rgba(106,138,173,.2)}
.rtag-elab{background:rgba(173,154,106,.1);color:var(--elab);border:1px solid rgba(173,154,106,.2)}
.rtag-cheat{background:rgba(200,122,90,.1);color:var(--cheat);border:1px solid rgba(200,122,90,.2)}
.rn{font-size:.88rem;font-weight:700;flex:1}
.rm{display:flex;gap:8px;font-size:.62rem}
.rt{color:var(--dim)}
.rp{color:var(--prot);font-weight:600}
.ra{font-size:.8rem;color:var(--dim);transition:transform .2s}
.recipe.open .ra{transform:rotate(90deg)}
.rb{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.recipe.open .rb{display:block}
.rs{margin-top:10px}
.rl{font-size:.67rem;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.rlist{font-size:.77rem;color:var(--dim);font-weight:300;line-height:1.8;padding:0}
.rlist li{list-style:none}
.rlist li::before{content:"· ";color:var(--accent)}
.rsteps{counter-reset:step}
.rsteps li{padding-left:20px;position:relative;margin-bottom:3px}
.rsteps li::before{content:counter(step);counter-increment:step;position:absolute;left:0;color:var(--accent2);font-weight:700;font-size:.7rem}
.rpd{display:flex;gap:16px;margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:6px;border:1px solid var(--border)}
.rpd div{font-size:.7rem}
.rpd .pn{color:var(--dim);font-weight:300}
.rpd .pv{color:var(--prot);font-weight:700;font-size:.82rem}
.rtip{margin-top:8px;font-size:.72rem;color:var(--accent);font-weight:300;font-style:italic;padding:7px 10px;background:rgba(122,173,106,.05);border-radius:6px;border:1px solid rgba(122,173,106,.1)}
.gen-btn{width:100%;padding:14px;background:linear-gradient(135deg,#2a3a28,#1a2a18);border:1px solid rgba(122,173,106,.3);border-radius:10px;color:var(--accent);font-size:.88rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;margin-bottom:16px}
.gen-btn:active{transform:scale(.98)}
.ptotals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px}
.ptotals .pt{text-align:center}
.ptotals .ptv{font-size:1.1rem;font-weight:700;color:var(--accent)}
.ptotals .ptl{font-size:.63rem;color:var(--dim);margin-top:2px}
.pday{margin-bottom:18px}
.pdh{font-size:.9rem;font-weight:700;padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:6px;display:flex;justify-content:space-between}
.pdh .dn{color:var(--text)}
.pdh .dp{font-size:.68rem;color:var(--dim);font-weight:400}
.pm{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:5px}
.pm .pmt{font-size:.57rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;min-width:52px}
.pm .pmn{font-size:.8rem;font-weight:600;flex:1}
.pm .pmp{font-size:.63rem;color:var(--prot);font-weight:600}
.pms{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;cursor:pointer;font-size:.68rem;color:var(--dim);font-family:'Outfit',sans-serif}
.pms:active{background:var(--card2)}
.shop{margin-top:20px;padding:18px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.shop h3{font-size:.88rem;font-weight:700;color:var(--accent2);margin-bottom:12px}
.scat{margin-bottom:12px}
.scat h4{font-size:.73rem;font-weight:600;color:var(--accent);margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.scat li{font-size:.76rem;color:var(--dim);font-weight:300;line-height:1.7;list-style:none}
.scat li::before{content:"· ";color:var(--accent)}
.scat .sq{color:var(--accent2);font-weight:500}
.sbase{margin-top:10px;font-size:.72rem;color:var(--dim);font-weight:300;padding:10px;background:var(--bg);border-radius:6px;border:1px solid var(--border)}
.sbase b{color:var(--accent2)}
.pantry{padding:18px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-top:18px}
.pantry h3{font-size:.88rem;font-weight:700;margin-bottom:10px;color:var(--accent)}
.pantry p{font-size:.76rem;color:var(--dim);font-weight:300;margin-bottom:12px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pcol h4{font-size:.72rem;font-weight:600;color:var(--accent2);margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.pcol li{font-size:.74rem;color:var(--dim);font-weight:300;line-height:1.6;list-style:none}
.pcol li::before{content:"· ";color:var(--accent)}
footer{text-align:center;padding:28px 0 16px;font-size:.68rem;color:var(--dim);font-weight:300}
@media(max-width:480px){.app{padding:12px 12px 60px}header h1{font-size:1.35rem}.pgrid{grid-template-columns:1fr}.rpd{flex-direction:column;gap:4px}.ptotals{grid-template-columns:1fr}}
</style>
</head>

const DAYS=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function pick(arr,n,ex=[]){return shuffle(arr.filter(r=>!ex.includes(r.id))).slice(0,n)}

function generatePlan(){
const bf=pick(R.filter(r=>r.cat==="bfast"),5);
const mains=R.filter(r=>r.cat!=="bfast");
const din=pick(mains,7);
const lun=pick(mains,4,din.map(r=>r.id));
plan={b:{},l:{},d:{}};
BFAST.forEach((d,i)=>{plan.b[d]=bf[i%bf.length]});
LUNCH.forEach((d,i)=>{plan.l[d]=lun[i%lun.length]});
DINNER.forEach((d,i)=>{plan.d[d]=din[i]});
}

function swapMeal(t,d){
const cat=t==="b"?"bfast":null;
const pool=cat?R.filter(r=>r.cat===cat):R.filter(r=>r.cat!=="bfast");
const used=[...Object.values(plan.b),...Object.values(plan.l),...Object.values(plan.d)].map(r=>r.id);
const avail=pool.filter(r=>!used.includes(r.id));
plan[t][d]=(avail.length>0?avail:pool)[Math.floor(Math.random()*(avail.length||pool.length))];
render();
}

function getShopList(){
if(!plan)return{};
const all=[...Object.values(plan.b),...Object.values(plan.l),...Object.values(plan.d)];
const agg={prot:{},carb:{},veg:{},fat:{},other:{}};
all.forEach(r=>{if(!r.shop)return;Object.keys(agg).forEach(c=>{(r.shop[c]||[]).forEach(item=>{agg[c][item]=(agg[c][item]||0)+1})})});
return agg;
}

function fmtShopItem(name,count){
const q=QTY[name];
if(!q)return name+" ×"+count;
const total=q.per*count;
return name+" — "+q.fmt(total);
}

return`<div class="recipe" data-cat="${r.cat}">
<div class="rh" onclick="this.closest('.recipe').classList.toggle('open')">
<span class="rtag rtag-${r.cat} mono">${CATS[r.cat]}</span>
<span class="rn">${r.name}</span>
<div class="rm"><span class="rt mono">${r.time}m</span><span class="rp mono">${r.protT}g</span></div>
<span class="ra">›</span></div>
<div class="rb">
<div class="rs"><div class="rl">Ingredientes (2 pers.)</div><ul class="rlist">${r.ing.map(i=>`<li>${i}</li>`).join("")}</ul></div>
<div class="rs"><div class="rl">Preparación</div><ol class="rlist rsteps">${r.steps.map(s=>`<li>${s}</li>`).join("")}</ol></div>

${r.tip?`<div class="rtip">${r.tip}</div>`:""}</div></div>`}

<div class="pcol"><h4>Verdura y fruta</h4><ul><li>Brócoli</li><li>Espinacas frescas (ensaladas + batidos)</li><li>Tomates</li><li>Rúcula</li><li>Cebollas, pimientos</li><li>Zanahorias, aguacates</li><li>Fresas, arándanos azules (batidos + postre)</li><li>Plátanos, manzanas, limones</li></ul>

function renderPlanner(){
if(!plan)generatePlan();
const SH=getShopList();
let tT=0,tC=0;
[plan.b,plan.l,plan.d].forEach(m=>Object.values(m).forEach(r=>{tT+=r.protT;tC+=r.protC}));
tT+=OFFICE_LUNCH.length*OFFICE_T+7*SNACK_T;
tC+=OFFICE_LUNCH.length*OFFICE_C+7*SNACK_C;

let h=`<button class="gen-btn" onclick="generatePlan();render()">🎲 Generar nueva semana</button>
<div class="ptotals"><div class="pt"><div class="ptv mono">${Math.round(tT/7)}g/día</div><div class="ptl">Prot. media Tomás</div></div>
<div class="pt"><div class="ptv mono">${Math.round(tC/7)}g/día</div><div class="ptl">Prot. media Claudia</div></div></div>`;

DAYS.forEach((d,i)=>{
let dT=SNACK_T,dC=SNACK_C,ms="";
const isOffice=OFFICE_LUNCH.includes(i);
if(isOffice){dT+=OFFICE_T;dC+=OFFICE_C}
const ml=[
[BFAST.includes(i)&&plan.b[i],"Desayuno","var(--bfast)","b"],
[LUNCH.includes(i)&&plan.l[i],"Comida","var(--elab)","l"],
[DINNER.includes(i)&&plan.d[i],"Cena","var(--quick)","d"]];
ml.forEach(([r,label,col,t])=>{if(r){dT+=r.protT;dC+=r.protC;
ms+=`<div class="pm"><span class="pmt mono" style="color:${col}">${label}</span><span class="pmn">${r.name}</span><span class="pmp mono">${r.protT}g</span><button class="pms" onclick="swapMeal('${t}',${i})">↻</button></div>`}});
if(isOffice){ms+=`<div class="pm" style="opacity:.6"><span class="pmt mono" style="color:var(--elab)">Oficina</span><span class="pmn">Menú del día</span><span class="pmp mono">${OFFICE_T}g</span></div>`}
ms+=`<div class="pm" style="opacity:.5"><span class="pmt mono" style="color:var(--dim)">Snacks</span><span class="pmn">Natillas/yogur proteico</span><span class="pmp mono">${SNACK_T}g</span></div>`;
const ok=dT>=150?"var(--accent)":"var(--cheat)";
h+=`<div class="pday"><div class="pdh"><span class="dn">${d}</span><span class="dp mono" style="color:${ok}">T:${dT}g · C:${dC}g</span></div>${ms}</div>`});

h+=`<div class="shop"><h3>🛒 Lista de compra · 2 personas</h3>`;
const CN={prot:"🥩 Proteínas",carb:"🍚 Carbos",veg:"🥬 Verdura y fruta",fat:"🫒 Salsas y grasas",other:"📦 Otros"};
Object.entries(SH).forEach(([c,items])=>{const e=Object.entries(items);if(!e.length)return;
h+=`<div class="scat"><h4>${CN[c]}</h4><ul>${e.map(([n,ct])=>`<li>${fmtShopItem(n,ct)}</li>`).join("")}</ul></div>`});
h+=`<div class="sbase"><b>Siempre en casa:</b> AOVE · sal yodada · pimienta · ajo · huevos (2 docenas) · arroz · pasta de lentejas · patatas del saco · pan integral · whey isolate · kéfir · leche semidesnatada · yogur griego/Skyr · almendras · especias</div></div>`;
return h;
}

function render(){
const a=document.getElementById("app");
let h=`<header><h1>Recetas · Capsule Pantry</h1><p>Ingredientes reutilizables · Proteína por persona</p></header>
<div class="tabs"><div class="tab${view==="recipes"?" active":""}" onclick="view='recipes';render()">📖 Recetas</div>
<div class="tab${view==="planner"?" active":""}" onclick="view='planner';render()">📅 Semana</div></div>`;
h+=view==="recipes"?renderRecipes():renderPlanner();
h+=`<footer>Capsule Pantry · Tomás 90kg · Claudia 55kg · 2026</footer>`;
a.innerHTML=h;window.scrollTo(0,0);
}

window.fCat=function(el,c){document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');
document.querySelectorAll('.recipe').forEach(r=>{if(c==='all'||r.dataset.cat===c)r.classList.remove('hidden');else{r.classList.add('hidden');r.classList.remove('open')}})};
window.swapMeal=swapMeal;window.generatePlan=generatePlan;
render();
</script>
